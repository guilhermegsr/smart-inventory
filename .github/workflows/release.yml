# Builds and publishes a release whenever a version tag (e.g. v1.0.0) is pushed.
#
# - "publish to GitHub Release" always runs and attaches the built jar.
# - The Modrinth / CurseForge steps run ONLY once their secrets are configured,
#   so this workflow is green today and auto-activates later (no YAML edits).
#   Add under Settings > Secrets and variables > Actions:
#     MODRINTH_TOKEN                       -> enables Modrinth
#     CURSEFORGE_TOKEN + CURSEFORGE_ID     -> enables CurseForge (numeric id)
name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-24.04
    env:
      MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
      CURSEFORGE_TOKEN: ${{ secrets.CURSEFORGE_TOKEN }}
      CURSEFORGE_ID: ${{ secrets.CURSEFORGE_ID }}
    steps:
      - name: checkout repository
        uses: actions/checkout@v6
      - name: validate gradle wrapper
        uses: gradle/actions/wrapper-validation@v6
      - name: setup jdk
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'microsoft'
      - name: make gradle wrapper executable
        run: chmod +x ./gradlew
      - name: build
        run: ./gradlew build

      - name: publish to GitHub Release
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          name: Smart Inventory ${{ github.ref_name }}
          version-type: release
          loaders: fabric
          game-versions: '26.1.2'
          java: '25'
          dependencies: |
            fabric-api(required)
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: publish to Modrinth
        if: ${{ env.MODRINTH_TOKEN != '' }}
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          name: Smart Inventory ${{ github.ref_name }}
          version-type: release
          loaders: fabric
          game-versions: '26.1.2'
          java: '25'
          dependencies: |
            fabric-api(required)
          modrinth-id: smart-inventory
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}

      - name: publish to CurseForge
        if: ${{ env.CURSEFORGE_TOKEN != '' && env.CURSEFORGE_ID != '' }}
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          name: Smart Inventory ${{ github.ref_name }}
          version-type: release
          loaders: fabric
          game-versions: '26.1.2'
          java: '25'
          dependencies: |
            fabric-api(required)
          curseforge-id: ${{ secrets.CURSEFORGE_ID }}
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}
