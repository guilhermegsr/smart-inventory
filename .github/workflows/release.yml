# Builds and publishes a release whenever a version tag (e.g. v1.0.0) is pushed.
# - Always attaches the built jar to a GitHub Release.
# - Also publishes to Modrinth / CurseForge IF the matching secrets are set;
#   mc-publish skips any platform whose token is missing, so this stays green
#   until you add MODRINTH_TOKEN / CURSEFORGE_TOKEN (+ CURSEFORGE_ID).
name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-24.04
    steps:
      - name: checkout repository
        uses: actions/checkout@v6
      - name: validate gradle wrapper
        uses: gradle/actions/wrapper-validation@v6
      - name: setup jdk
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'microsoft'
      - name: make gradle wrapper executable
        run: chmod +x ./gradlew
      - name: build
        run: ./gradlew build
      - name: publish
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          name: Smart Inventory ${{ github.ref_name }}
          version-type: release
          loaders: fabric
          game-versions: '26.1.2'
          java: '25'
          dependencies: |
            fabric-api(required)

          # GitHub Release — always (uses the built-in token).
          github-token: ${{ secrets.GITHUB_TOKEN }}

          # Modrinth — only runs once MODRINTH_TOKEN is set as a repo secret.
          modrinth-id: smart-inventory
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}

          # CurseForge — only runs once CURSEFORGE_TOKEN (+ CURSEFORGE_ID) are set.
          curseforge-id: ${{ secrets.CURSEFORGE_ID }}
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}
